<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: white; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🧪 Test Connexion API</h1>
    
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        async function testLogin() {
            try {
                console.log('1️⃣  Test POST /api/auth/login...');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@maloty.com',
                        password: 'admin123'
                    })
                });

                console.log('2️⃣  Response status:', response.status);
                const data = await response.json();
                console.log('3️⃣  Response data:', data);

                // Afficher le résultat
                if (response.ok && data.success) {
                    resultsDiv.innerHTML = `
                        <div class="test success">
                            <h3>✅ Connexion réussie!</h3>
                            <p>Token: ${data.token.substring(0, 20)}...</p>
                            <p>User: ${data.user.name} (${data.user.email})</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="test error">
                            <h3>❌ Erreur de connexion</h3>
                            <p>Status: ${response.status}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('ERREUR:', e);
                resultsDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ Erreur réseau/serveur</h3>
                        <p>${e.message}</p>
                        <pre>${e.stack}</pre>
                    </div>
                `;
            }
        }

        // Lancer le test
        testLogin();
    </script>
</body>
</html>
