<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test Sandbox API Paiement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            text-align: left;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        .btn-warning:hover {
            background: #dd6b20;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .btn-info {
            background: #4299e1;
            color: white;
        }
        
        .btn-info:hover {
            background: #3182ce;
        }
        
        .results-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .result-item {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7fafc;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        
        .result-item.success {
            border-left-color: #48bb78;
            background: #f0fff4;
        }
        
        .result-item.error {
            border-left-color: #f56565;
            background: #fff5f5;
        }
        
        .result-item.warning {
            border-left-color: #ed8936;
            background: #fffaf0;
        }
        
        .result-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        pre {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .status-badge.success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-badge.error {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-badge.pending {
            background: #feebc8;
            color: #7c2d12;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2d3748;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }
        
        .info-box {
            background: #edf2f7;
            border-left: 4px solid #4299e1;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .info-box strong {
            color: #2c5282;
        }
        
        .loading-text {
            text-align: center;
            color: #4299e1;
            font-weight: bold;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #4a5568;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Sandbox API Paiement</h1>
            <p>Testez votre système de paiement en local sans API externes</p>
        </header>
        
        <!-- Status -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    ℹ️ Status Sandbox
                </div>
                <div class="card-body">
                    <button class="btn-info" onclick="checkStatus()">
                        Vérifier le Statut
                    </button>
                    <div id="status-result"></div>
                </div>
            </div>
        </div>
        
        <!-- Quick Tests -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    ⚡ Tests Rapides
                </div>
                <div class="card-body">
                    <div class="button-group">
                        <button class="btn-primary" onclick="quickCreatePayment()">
                            💳 Créer Paiement
                        </button>
                        <button class="btn-success" onclick="quickWorkflow()">
                            🔄 Workflow Complet
                        </button>
                        <button class="btn-info" onclick="quickListPayments()">
                            📋 Lister Paiements
                        </button>
                        <button class="btn-warning" onclick="quickGenerateData()">
                            🎲 Générer 10 Tests
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    🔧 Actions Avancées
                </div>
                <div class="card-body">
                    <div class="button-group">
                        <button class="btn-warning" onclick="showAdvancedForm()">
                            🎯 Créer Paiement Personnalisé
                        </button>
                        <button class="btn-info" onclick="showConfirmForm()">
                            ✅ Confirmer Paiement
                        </button>
                        <button class="btn-danger" onclick="resetAllData()">
                            🗑️ Réinitialiser Données
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Advanced Forms -->
        <div id="advanced-form" style="display: none;">
            <div class="results-container" style="margin-bottom: 20px;">
                <div class="card-header" style="background: #764ba2; cursor: pointer;" onclick="toggleForm('advanced-form')">
                    🎯 Créer Paiement Personnalisé
                </div>
                <div style="padding: 20px;">
                    <div class="input-group">
                        <label>Type de Paiement</label>
                        <select id="payment-type">
                            <option value="tithe">Dîme</option>
                            <option value="offering">Offrande</option>
                            <option value="donation">Don</option>
                            <option value="deposit">Dépôt</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Montant</label>
                        <input type="number" id="payment-amount" placeholder="50000" value="50000">
                    </div>
                    <div class="input-group">
                        <label>Devises</label>
                        <select id="payment-currency">
                            <option value="CDF">CDF</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Nom du Donateur</label>
                        <input type="text" id="payment-donor-name" placeholder="Jean Doe">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="payment-donor-email" placeholder="jean@test.local">
                    </div>
                    <button class="btn-primary" style="width: 100%;" onclick="createCustomPayment()">
                        Créer Paiement
                    </button>
                </div>
            </div>
        </div>
        
        <div id="confirm-form" style="display: none;">
            <div class="results-container" style="margin-bottom: 20px;">
                <div class="card-header" style="background: #764ba2; cursor: pointer;" onclick="toggleForm('confirm-form')">
                    ✅ Confirmer Paiement
                </div>
                <div style="padding: 20px;">
                    <div class="input-group">
                        <label>Référence de Paiement (TEST-PAY-...)</label>
                        <input type="text" id="confirm-ref" placeholder="TEST-PAY-2026-ABC123">
                    </div>
                    <div class="input-group">
                        <label>Code de Confirmation (TEST-...)</label>
                        <input type="text" id="confirm-code" placeholder="TEST-A1B2-C3D4-E5F6">
                    </div>
                    <button class="btn-success" style="width: 100%;" onclick="confirmPaymentCustom()">
                        Confirmer
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Results -->
        <div class="results-container">
            <div class="card-header" style="background: #764ba2; cursor: pointer; user-select: none;" onclick="toggleResults()">
                📊 Résultats <span id="results-toggle" style="float: right;">▼</span>
            </div>
            <div id="results" style="padding: 20px;"></div>
        </div>
    </div>

    <script>
        let resultsVisible = true;

        function toggleResults() {
            resultsVisible = !resultsVisible;
            const resultsDiv = document.getElementById('results');
            const toggle = document.getElementById('results-toggle');
            
            if (resultsVisible) {
                resultsDiv.style.display = 'block';
                toggle.textContent = '▼';
            } else {
                resultsDiv.style.display = 'none';
                toggle.textContent = '▶';
            }
        }

        function toggleForm(formId) {
            const form = document.getElementById(formId);
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function showAdvancedForm() {
            document.getElementById('advanced-form').style.display = 'block';
            document.getElementById('confirm-form').style.display = 'none';
        }

        function showConfirmForm() {
            document.getElementById('confirm-form').style.display = 'block';
            document.getElementById('advanced-form').style.display = 'none';
        }

        async function makeRequest(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const url = `/MALOTY/backend/api/payment_sandbox/${endpoint}`;
                const response = await fetch(url, options);
                const data = await response.json();
                
                return {
                    status: response.status,
                    data: data
                };
            } catch (error) {
                return {
                    status: 'error',
                    data: { error: error.message }
                };
            }
        }

        function displayResult(title, data, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString('fr-FR');
            
            const statusClass = data.status === 'success' || data.status === 200 ? 'success' : 
                              data.status === 'error' ? 'error' : 'warning';
            
            const resultHTML = `
                <div class="result-item ${statusClass}">
                    <div class="result-header">
                        ⏰ ${timestamp} - ${title}
                    </div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
            
            resultsDiv.insertAdjacentHTML('afterbegin', resultHTML);
            
            // Garder seulement les 10 derniers résultats
            const items = resultsDiv.querySelectorAll('.result-item');
            if (items.length > 10) {
                items[items.length - 1].remove();
            }
        }

        // Quick Tests
        async function checkStatus() {
            const result = await makeRequest('status');
            displayResult('🔍 Status Sandbox', result.data, 'info');
        }

        async function quickCreatePayment() {
            const result = await makeRequest('test-create', 'POST', {
                type: 'tithe',
                amount: 50000,
                donor_name: 'Test User'
            });
            displayResult('💳 Paiement Créé', result.data, result.data.status);
        }

        async function quickWorkflow() {
            const result = await makeRequest('test-simulate', 'POST', { delay: 1 });
            displayResult('🔄 Workflow Complet', result.data, result.data.summary?.status);
        }

        async function quickListPayments() {
            const result = await makeRequest('test-list');
            displayResult('📋 Liste des Paiements', result.data, result.data.status);
        }

        async function quickGenerateData() {
            const result = await makeRequest('generate-test-data', 'POST', { count: 10 });
            displayResult('🎲 Données Générées', result.data, result.data.status);
        }

        // Advanced Tests
        async function createCustomPayment() {
            const body = {
                type: document.getElementById('payment-type').value,
                amount: parseInt(document.getElementById('payment-amount').value),
                currency: document.getElementById('payment-currency').value,
                donor_name: document.getElementById('payment-donor-name').value,
                donor_email: document.getElementById('payment-donor-email').value
            };
            
            const result = await makeRequest('test-create', 'POST', body);
            displayResult('💳 Paiement Personnalisé', result.data, result.data.status);
        }

        async function confirmPaymentCustom() {
            const body = {
                payment_ref: document.getElementById('confirm-ref').value,
                confirmation_code: document.getElementById('confirm-code').value
            };
            
            if (!body.payment_ref || !body.confirmation_code) {
                displayResult('❌ Erreur', { error: 'Remplissez tous les champs' }, 'error');
                return;
            }
            
            const result = await makeRequest('test-confirm', 'POST', body);
            displayResult('✅ Confirmation', result.data, result.data.status);
        }

        async function resetAllData() {
            if (!confirm('⚠️ Cela supprimera TOUS les paiements de test!\n\nContinuer ?')) {
                return;
            }
            
            const result = await makeRequest('reset-all', 'POST', { confirm: true });
            displayResult('🗑️ Réinitialisation', result.data, result.data.status);
        }

        // Charger le status au démarrage
        window.addEventListener('load', () => {
            checkStatus();
        });
    </script>
</body>
</html>
